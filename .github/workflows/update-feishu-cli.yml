name: Update feishu-cli formula

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Resolve latest version and checksums
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag=$(curl -fsSL https://api.github.com/repos/riba2534/feishu-cli/releases/latest | jq -r '.tag_name')
          version="${tag#v}"

          arm_url="https://github.com/riba2534/feishu-cli/releases/download/${tag}/feishu-cli_${tag}_darwin-arm64.tar.gz"
          amd_url="https://github.com/riba2534/feishu-cli/releases/download/${tag}/feishu-cli_${tag}_darwin-amd64.tar.gz"

          arm_sha=$(curl -fsSL "$arm_url" | sha256sum | awk '{print $1}')
          amd_sha=$(curl -fsSL "$amd_url" | sha256sum | awk '{print $1}')

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "arm_sha=$arm_sha"
            echo "amd_sha=$amd_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Update formula file
        shell: bash
        run: |
          cat > Formula/feishu-cli.rb <<FORMULA
          class FeishuCli < Formula
            desc "飞书开放平台命令行工具（Markdown 与飞书文档双向转换）"
            homepage "https://github.com/riba2534/feishu-cli"
            version "${{ steps.meta.outputs.version }}"
            license "MIT"

            if Hardware::CPU.arm?
              url "https://github.com/riba2534/feishu-cli/releases/download/v#{version}/feishu-cli_v#{version}_darwin-arm64.tar.gz"
              sha256 "${{ steps.meta.outputs.arm_sha }}"
            else
              url "https://github.com/riba2534/feishu-cli/releases/download/v#{version}/feishu-cli_v#{version}_darwin-amd64.tar.gz"
              sha256 "${{ steps.meta.outputs.amd_sha }}"
            end

            def install
              bin.install "feishu-cli"
            end

            test do
              system "#{bin}/feishu-cli", "--version"
            end
          end
          FORMULA

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/feishu-cli.rb
          git commit -m "chore: bump feishu-cli to ${{ steps.meta.outputs.version }}"
          git push
